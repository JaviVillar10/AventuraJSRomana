<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Objetos - AventuraJSRomana</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>

    <h1>Añadir nuevo objeto al mercado</h1>

    <form id="crear-objeto">

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"
            minlength="3"
            pattern="[A-ZÁÉÍÓÚÑ][a-zA-ZÁÉÍÓÚáéíóúñÑ ]{2,}"
            title="Debe empezar por mayúscula, contener solo letras y tener mínimo 3 caracteres."
            placeholder="Espada Corta"
            required>

        <label for="precio">Precio:</label>
        <input type="number" id="precio" name="precio"
            min="1" max="98" step="1"
            title="Debe ser un número entero positivo menor de 99."
            required>

        <label for="rareza">Rareza:</label>
        <select id="rareza" name="rareza">
            <option value="Común">Común</option>
            <option value="Raro">Raro</option>
            <option value="Épico">Épico</option>
        </select>

        <label for="tipo">Tipo:</label>
        <select id="tipo" name="tipo">
            <option value="Armadura">Armadura</option>
            <option value="Arma">Arma</option>
            <option value="Consumible">Consumible</option>
        </select>

        <label for="bonus">Bonus:</label>
        <input type="text" id="bonus" name="bonus"
            pattern="\+\d{1,3}"
            title="Debe comenzar por + seguido de 1 a 3 dígitos (ej: +15, +100)."
            placeholder="+10"
            required>

        <label for="imagen">Imagen:</label>
        <input type="file" id="imagen" name="imagen" accept="image/*">

        <button type="submit">Crear Objeto</button>

    </form>

    <br>
    <a href="index.html"><button type="button">Ir al videojuego</button></a>

    <script src="src/objeto.js"></script>
</body>
</html>
